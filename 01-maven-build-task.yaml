apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: maven-build
spec:
  params:
    - name: source-repo
      type: string
      description: Git repository URL
    - name: revision
      type: string
      default: "main"
  workspaces:
    - name: source
    - name: maven-cache
  steps:
    - name: git-clone
      image: alpine/git
      script: |
        cd $(workspaces.source.path)
        git clone $(params.source-repo) .
        git checkout $(params.revision)
    - name: maven-build
      image: maven:3.9-eclipse-temurin-21
      workingDir: $(workspaces.source.path)
      script: |
        mvn clean package -DskipTests
      volumeMounts:
        - name: maven-cache
          mountPath: /root/.m2
  volumes:
    - name: maven-cache
      emptyDir: {}